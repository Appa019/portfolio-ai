<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, sans-serif; color: #2d2d2d; max-width: 600px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 20px; color: #1a7a6d; }
    h2 { font-size: 16px; color: #444; margin-top: 24px; }
    .card { background: #f8f8f6; border-radius: 8px; padding: 16px; margin: 12px 0; }
    .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { font-size: 18px; font-weight: 600; margin-top: 4px; }
    .positive { color: #2d8a4e; }
    .negative { color: #c0392b; }
    .footer { font-size: 12px; color: #aaa; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>Relatório Semanal — {{ period }}</h1>
  <div class="card">
    <div class="label">Performance da Semana</div>
    <div class="value">{{ performance }}</div>
  </div>
  <h2>Destaques</h2>
  <p>{{ highlights }}</p>
  <h2>Alertas</h2>
  <p>{{ alerts }}</p>
  <p class="footer">PortfolioAI — Relatório semanal automático</p>
</body>
</html>
