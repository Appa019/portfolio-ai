<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, sans-serif; color: #2d2d2d; max-width: 600px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 20px; color: #1a7a6d; }
    .card { background: #f8f8f6; border-radius: 8px; padding: 16px; margin: 12px 0; }
    .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { font-size: 18px; font-weight: 600; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
    th { color: #888; font-weight: 500; font-size: 12px; text-transform: uppercase; }
    .footer { font-size: 12px; color: #aaa; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>Recomendação de Aporte Pronta</h1>
  <div class="card">
    <div class="label">Valor do Aporte</div>
    <div class="value">R$ {{ amount_brl }}</div>
  </div>
  <p>{{ summary }}</p>
  <p class="footer">PortfolioAI — Gerado automaticamente</p>
</body>
</html>
