<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, sans-serif; color: #2d2d2d; max-width: 600px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 20px; color: #1a7a6d; }
    .card { background: #f8f8f6; border-radius: 8px; padding: 16px; margin: 12px 0; }
    .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { font-size: 18px; font-weight: 600; margin-top: 4px; }
    .footer { font-size: 12px; color: #aaa; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>Lock-Up Expirado — {{ ticker }}</h1>
  <div class="card">
    <div class="label">Ativo</div>
    <div class="value">{{ ticker }}</div>
  </div>
  <div class="card">
    <div class="label">Recomendação</div>
    <div class="value">{{ recommendation }}</div>
  </div>
  <p>{{ justification }}</p>
  <p class="footer">PortfolioAI — Reavaliação D+30 automática</p>
</body>
</html>
